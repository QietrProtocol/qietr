name: Publish SDK

on:
  push:
    tags:
      - "sdk-v*"

jobs:
  publish:
    name: Publish @qietr/sdk to npm
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: qietr-sdk
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          registry-url: "https://registry.npmjs.org"
          cache: "npm"
          cache-dependency-path: qietr-sdk/package-lock.json
      - run: npm ci
      - run: npm run typecheck
      - run: npm test
      - run: npm run build
      - run: npm publish --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
