name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always
  # NOTE: we do NOT enforce `-D warnings`. It would apply to every cargo
  # invocation — third-party deps and the `cargo install anchor-cli` step
  # included — overriding cargo's default `--cap-lints allow` for dependencies.
  # New rustc lints (unexpected_cfgs from Anchor's `#[program]` macro,
  # mismatched_lifetime_syntaxes in solana crates) then turn routine warnings
  # into hard build failures on every push. `setup-rust-toolchain` also defaults
  # its `rustflags` input to `-D warnings`, so each Rust job below sets
  # `rustflags: ""` to opt out. Enforce lints on our own code via clippy later.

jobs:
  sdk:
    name: SDK (typecheck + test)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: qietr-sdk
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: "npm"
          cache-dependency-path: qietr-sdk/package-lock.json
      - run: npm ci
      # Tests import the compiled output from ./dist (gitignored), so build first.
      - run: npm run build
      - run: npm run typecheck
      - run: npm test

  web:
    name: Web (typecheck + lint + build)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: qietr-web
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: "npm"
          cache-dependency-path: qietr-web/package-lock.json
      # The web app depends on `@qietr/sdk` via `file:../qietr-sdk` (a symlink),
      # which serves its compiled ./dist. Build the SDK before the web typecheck,
      # otherwise module resolution fails (TS2307: Cannot find module '@qietr/sdk').
      - name: Build local @qietr/sdk
        working-directory: qietr-sdk
        run: |
          npm ci
          npm run build
      - run: npm ci
      - run: npm run typecheck
      - run: npm run lint
      - run: npm run build

  circuits:
    name: Circuits (test)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: qietr-circuits
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: "npm"
          cache-dependency-path: qietr-circuits/package-lock.json
      # circom is a standalone Rust binary (not on npm). Grab the pinned
      # release used locally so the compiled wasm matches.
      - name: Install circom
        run: |
          curl -sSfL https://github.com/iden3/circom/releases/download/v2.1.9/circom-linux-amd64 -o "$HOME/.local/bin/circom" --create-dirs
          chmod +x "$HOME/.local/bin/circom"
          echo "$HOME/.local/bin" >> "$GITHUB_PATH"
      - run: circom --version
      - run: npm ci
      # The wasm + dev zkey + verifying key are gitignored (trusted-setup
      # output, never committed). Build the circuit and a DEV-ONLY setup in
      # CI so the prove/verify tests run for real. These keys are throwaway —
      # production uses a real multi-party ceremony (see setup-dev.sh).
      - name: Build circuit + dev keys
        run: |
          npm run compile
          npm run setup:dev
      - run: npm test

  relayer:
    name: Relayer (typecheck + build)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: qietr-relayer
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: "npm"
          cache-dependency-path: qietr-relayer/package-lock.json
      - run: npm ci
      - run: npm run typecheck
      - run: npm run build

  indexer-api:
    name: Indexer API (typecheck + build)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: qietr-indexer/api
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: "npm"
          cache-dependency-path: qietr-indexer/api/package-lock.json
      - run: npm ci
      - run: npm run typecheck
      - run: npm run build

  pool:
    name: Pool program (cargo check)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: qietr-pool
    steps:
      - uses: actions/checkout@v4
      - uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          toolchain: stable
          rustflags: ""
      - uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            qietr-pool/target
          key: ${{ runner.os }}-cargo-pool-${{ hashFiles('qietr-pool/Cargo.lock') }}
      - run: cargo check

  escrow:
    name: Escrow program (cargo check)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: qietr-escrow
    steps:
      - uses: actions/checkout@v4
      - uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          toolchain: stable
          rustflags: ""
      - uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            qietr-escrow/target
          key: ${{ runner.os }}-cargo-escrow-${{ hashFiles('qietr-escrow/Cargo.lock') }}
      - run: cargo check

  msg:
    name: Msg program (cargo check)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: qietr-msg
    steps:
      - uses: actions/checkout@v4
      - uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          toolchain: stable
          rustflags: ""
      - uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            qietr-msg/target
          key: ${{ runner.os }}-cargo-msg-${{ hashFiles('qietr-msg/Cargo.lock') }}
      - run: cargo check

  geyser:
    name: Geyser plugin (cargo check)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: qietr-indexer/geyser-plugin
    steps:
      - uses: actions/checkout@v4
      - uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          toolchain: stable
          rustflags: ""
      - uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            qietr-indexer/geyser-plugin/target
          key: ${{ runner.os }}-cargo-geyser-${{ hashFiles('qietr-indexer/geyser-plugin/Cargo.lock') }}
      # --locked: use the committed Cargo.lock exactly. Without it CI
      # free-resolves a newer brotli/alloc-no-stdlib graph that fails to
      # compile on stable rustc.
      - run: cargo check --locked

  # NOTE: the full on-chain `anchor test` (spins up a validator, builds the
  # program with the pinned platform-tools, builds the circuit + SDK, runs the
  # TS suite) lives in .github/workflows/integration.yml. It runs nightly and
  # on manual dispatch — too heavy (~15-20 min, slow anchor-cli install) to
  # gate every push. The fast `pool` cargo-check job above is the per-push gate.
