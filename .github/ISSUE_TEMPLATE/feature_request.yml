name: Feature request
description: Suggest an improvement or new capability.
labels: ["enhancement"]
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem / motivation
      description: What are you trying to do that's hard or impossible today?
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
      description: What would you like to see? Sketch the API/UX if relevant.
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
  - type: dropdown
    id: component
    attributes:
      label: Component
      options:
        - qietr-pool (program)
        - qietr-escrow / qietr-msg
        - qietr-circuits
        - qietr-sdk
        - qietr-relayer
        - qietr-indexer
        - qietr-web
        - docs / other
    validations:
      required: true
