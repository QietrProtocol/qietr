[toolchain]
anchor_version = "0.30.1"

[features]
seeds = false
skip-lint = false

[programs.localnet]
qietr_pool = "2zaHsJNoZ1adQtecG7yRv1NCCVzaX3yaRD6CeQBQimVc"

[programs.devnet]
qietr_pool = "2zaHsJNoZ1adQtecG7yRv1NCCVzaX3yaRD6CeQBQimVc"

[registry]
url = "https://api.apr.dev"

[provider]
cluster = "Localnet"
wallet = "~/.config/solana/id.json"

[scripts]
test = "yarn run ts-mocha -p ./tsconfig.json -t 1000000 tests/**/*.ts"

# NOTE: the program-id above is a placeholder. A real keypair must be
# generated and the address committed here before the first build. The
# verifier configuration (verifying-key bytes) for the Groth16 verifier is
# loaded from PoolConfig at runtime, not declared here.
